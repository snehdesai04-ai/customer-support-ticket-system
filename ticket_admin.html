<!DOCTYPE html>
<!--
  CUSTOMER SUPPORT TICKET SYSTEM
  Built by: Sneh Desai
  -----------------------------------------------
  FILE 3 of 6: admin.html
  Admin view — manage all tickets, update status, add notes
-->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SupportDesk | Admin Panel</title>
  <link rel="stylesheet" href="ticket_style.css"/>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-brand">🎫 SupportDesk</div>
    <div class="nav-right">
      <span class="nav-user">🛡️ <span id="nav-username"></span></span>
      <span class="nav-badge admin-badge">Admin</span>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="container">

    <!-- PAGE HEADER -->
    <div class="page-header">
      <div>
        <h1>Admin Control Panel</h1>
        <p>Manage all customer support tickets</p>
      </div>
      <div class="header-actions">
        <button class="secondary-btn" onclick="exportTickets()">📥 Export Report</button>
      </div>
    </div>

    <!-- SUMMARY CARDS -->
    <div class="summary admin-summary">
      <div class="card stat-card">
        <div class="stat-icon">🎫</div>
        <div class="stat-info">
          <div class="stat-number" id="a-total">0</div>
          <div class="stat-label">Total Tickets</div>
        </div>
      </div>
      <div class="card stat-card">
        <div class="stat-icon">🔴</div>
        <div class="stat-info">
          <div class="stat-number open-color" id="a-open">0</div>
          <div class="stat-label">Open</div>
        </div>
      </div>
      <div class="card stat-card">
        <div class="stat-icon">🟡</div>
        <div class="stat-info">
          <div class="stat-number progress-color" id="a-progress">0</div>
          <div class="stat-label">In Progress</div>
        </div>
      </div>
      <div class="card stat-card">
        <div class="stat-icon">🟢</div>
        <div class="stat-info">
          <div class="stat-number resolved-color" id="a-resolved">0</div>
          <div class="stat-label">Resolved</div>
        </div>
      </div>
      <div class="card stat-card">
        <div class="stat-icon">🚨</div>
        <div class="stat-info">
          <div class="stat-number critical-color" id="a-critical">0</div>
          <div class="stat-label">Critical</div>
        </div>
      </div>
    </div>

    <!-- FILTERS & SEARCH -->
    <div class="card filter-card">
      <div class="admin-filters">
        <div class="search-box">
          <input type="text" id="admin-search" placeholder="🔍 Search by subject, customer, or ID..." oninput="adminSearch()"/>
        </div>
        <div class="filter-group">
          <select id="filter-status" onchange="applyAdminFilters()">
            <option value="all">All Status</option>
            <option value="Open">Open</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
            <option value="Closed">Closed</option>
          </select>
          <select id="filter-priority" onchange="applyAdminFilters()">
            <option value="all">All Priority</option>
            <option value="Critical">Critical</option>
            <option value="High">High</option>
            <option value="Medium">Medium</option>
            <option value="Low">Low</option>
          </select>
          <select id="filter-category" onchange="applyAdminFilters()">
            <option value="all">All Categories</option>
            <option value="Internet">Internet</option>
            <option value="Phone">Phone</option>
            <option value="TV">TV</option>
            <option value="Billing">Billing</option>
            <option value="Technical">Technical</option>
            <option value="Account">Account</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
    </div>

    <!-- TICKETS TABLE -->
    <div class="card">
      <div class="list-header">
        <h2>🗂️ All Tickets</h2>
        <span class="ticket-count" id="ticket-count">0 tickets</span>
      </div>
      <div id="admin-ticket-list"></div>
    </div>

  </div>

  <!-- TICKET MANAGEMENT MODAL -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal large-modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modal-subject"></h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div id="modal-content"></div>
    </div>
  </div>

  <div class="flash" id="flash"></div>

  <script src="ticket_app.js"></script>
  <script> initAdmin(); </script>
</body>
</html>
